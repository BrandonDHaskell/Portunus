name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    name: Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: server/go.sum

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: vet + fmt + test (race detector)
        run: task ci:server

  proto-check:
    name: Proto drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: server/go.sum

      - name: Install protoc
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q protobuf-compiler

      - name: Install Go proto plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
        working-directory: server

      - name: Install nanopb
        run: pip install nanopb

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for proto drift
        run: task proto:check

  firmware:
    name: Firmware
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:release-v5.4
    steps:
      - uses: actions/checkout@v4

      - name: Build firmware
        working-directory: access_module
        run: |
          . $IDF_PATH/export.sh
          idf.py build
