// Portunus — shared message contract
//
// This file is the single source of truth for the wire format between the
// Portunus server and ESP32 access modules.  Both sides generate code from
// this file:
//
//   Server (Go):  protoc  + protoc-gen-go
//   ESP32  (C):   protoc  + nanopb generator  (see ../nanopb/portunus.options)
//
// The access module sends Nanopb-encoded messages to the server using one
// of two transport modes (selected at build time via Kconfig):
//
//   1. gRPC over HTTP/2+TLS (CONFIG_PORTUNUS_USE_GRPC=y, recommended):
//      Uses nghttp2 + esp-tls on the ESP32 to speak the gRPC wire protocol.
//      Connects to the PortunusService defined below.
//
//   2. HTTP/1.1+TLS with protobuf (legacy / fallback):
//      POSTs Nanopb-encoded messages with Content-Type: application/x-protobuf
//      and an HMAC-SHA256 signature header (X-Portunus-Sig).
//
// The PortunusService block below is the canonical RPC contract.  The wire
// encoding (request/response message types) is identical whether the
// transport is gRPC or the HTTP/1.1 path, keeping both in sync.
//
// ─── Compatibility rules ───────────────────────────────────────────────────
//   • Only APPEND new fields (never reorder or reuse a field number).
//   • Mark removed fields as `reserved`.
//   • Keep optional semantics where the ESP32 may not have the data
//     (e.g. door_closed before a reed-switch is wired).
// ───────────────────────────────────────────────────────────────────────────

syntax = "proto3";

package portunus.v1;

option go_package = "github.com/BrandonDHaskell/Portunus/server/api/portunusv1";

// ──────────────────────────────────────────────────────────────────────────
// Heartbeat
// ──────────────────────────────────────────────────────────────────────────

// Sent by the access module at a regular interval to report health
// telemetry and confirm connectivity.
//
// Server Go equivalent: types.HeartbeatRequest
message HeartbeatRequest {
  // Unique identifier for the access module (required).
  // Corresponds to PORTUNUS_MAX_NAME_LEN (32 chars) on the device.
  string module_id = 1;

  // Firmware version string, e.g. "0.1.0-mvp".
  string firmware_version = 2;

  // Seconds since the module booted (esp_timer / 1e6 on ESP32).
  // uint64 matches the Go type; the ESP32 populates the lower 32 bits.
  uint64 uptime_s = 3;

  // Reed-switch state.  Omitted when no reed switch is installed.
  optional bool door_closed = 4;

  // WiFi RSSI in dBm.  Omitted when unavailable.
  optional int32 rssi_dbm = 5;

  // IP address of the module (IPv4 dotted-quad or IPv6).
  string ip = 6;

  // ── ESP32 telemetry (not yet consumed by the server) ──────────────────

  // Free heap in bytes at the time of the heartbeat.
  uint32 free_heap_bytes = 7;

  // Monotonically increasing heartbeat counter (resets on reboot).
  uint32 sequence = 8;
}

// Returned by the server to acknowledge the heartbeat.
//
// Server Go equivalent: types.HeartbeatResponse
message HeartbeatResponse {
  // Always true on a successful heartbeat.
  bool ok = 1;

  // Whether the module_id is registered in the device registry.
  bool known = 2;

  // Echoed module_id.
  string module_id = 3;

  // Server wall-clock time (RFC 3339 with nanoseconds).
  string server_time = 4;
}

// ──────────────────────────────────────────────────────────────────────────
// Access
// ──────────────────────────────────────────────────────────────────────────

// Sent by the access module when a credential is presented to the reader.
//
// Server Go equivalent: types.AccessRequest
message AccessRequest {
  // Unique identifier for the access module (required).
  string module_id = 1;

  // Hex-encoded credential UID, e.g. "04:A3:2B:1C" (required).
  string credential_id = 2;

  // Reed-switch state at the moment of the read.
  optional bool door_closed = 3;

  // Device-local timestamp of the read (ISO 8601 / RFC 3339).
  // Optional because the module may not have an RTC.
  string requested_at = 4;
}

// Returned by the server with the access decision.
//
// Server Go equivalent: types.AccessResponse
message AccessResponse {
  // True if the request was processed without internal error.
  bool ok = 1;

  // Whether the module_id is registered in the device registry.
  bool known = 2;

  // The access decision: true = unlock, false = deny.
  bool granted = 3;

  // Human-readable reason code included in the wire response.
  // Grant: "allow_all" | "credential_allowed"
  // Deny:  "denied" | "unknown_module" | "invalid_credential_format"
  //        | "credential_not_found"
  //        | "member_expired" | "member_suspended" | "member_archived"
  //        | "member_disabled"
  //        | "module_not_authorized"
  //        | "authorization_revoked" | "authorization_expired"
  // Longest value: "invalid_credential_format" (25 chars).
  // Nanopb max_size:33 (32 chars + NUL) — never add a reason longer than 32.
  // Note: "member_lookup_error" and "service_misconfigured" appear in the
  // audit log only; the service returns an error to the transport in those
  // cases and does not populate this field.
  string reason = 4;

  // Echoed module_id.
  string module_id = 5;

  // Server wall-clock time (RFC 3339 with nanoseconds).
  string server_time = 6;
}

// ──────────────────────────────────────────────────────────────────────────
// Provisioning (PROVISIONING_CONSOLE firmware variant)
// ──────────────────────────────────────────────────────────────────────────

// Sent by a provisioning console after a successful two-scan flow.
// The device sends raw RFID UID bytes for both scans; the server applies
// HMAC-SHA256 and resolves the scan-1 UID to a member_access record for
// attribution.
//
// Server Go equivalent: types.ProvisionCredentialRequest
message ProvisionCredentialRequest {
  // Retired: was the admin operator UUID sent directly from Kconfig firmware.
  // Replaced by operator_credential_uid (field 6).  Must not be reused.
  reserved 1;
  reserved "operator_uuid";

  // Module ID of the provisioning console.
  string module_id              = 2;

  // Retired: was SHA-256(raw UID bytes) computed on-device.  Replaced by
  // credential_uid (field 5) so the server can apply a consistent HMAC.
  reserved 3;
  reserved "credential_hash";

  // Role ID to assign to the new member.  Must already exist on the server.
  string role_id                = 4;

  // Raw RFID UID bytes read from the new-member card (scan 2, 1–10 bytes).
  // The server computes HMAC-SHA256(secret, credential_uid) before storing.
  bytes  credential_uid         = 5;

  // Raw RFID UID bytes read from the operator's card (scan 1, 1–10 bytes).
  // The server hashes this and resolves the operator against member_access,
  // checking that the member's role carries member.provision permission.
  bytes  operator_credential_uid = 6;

  // Explicit provisioning mode selected by the PEU firmware.
  // When UNSPECIFIED the server infers the mode from operator_credential_uid
  // presence (empty = capture path, non-empty = operator-enrol path).
  ProvisionMode provision_mode = 7;
}

// Returned by the server after processing a provisioning request.
//
// Server Go equivalent: types.ProvisionCredentialResponse
message ProvisionCredentialResponse {
  // UUID assigned to the new member record.  Non-empty on SUCCESS only.
  string member_uuid   = 1;

  ProvisionStatus status = 2;

  // Human-readable detail for duplicate/error cases (operator display).
  string detail = 3;
}

// Status codes for ProvisionCredentialResponse.
enum ProvisionStatus {
  PROVISION_STATUS_UNSPECIFIED  = 0;
  PROVISION_STATUS_SUCCESS      = 1;
  // credential_hash is already assigned to an active member.
  PROVISION_STATUS_DUPLICATE_ACTIVE   = 2;
  // credential_hash exists but belongs to an expired or archived member.
  PROVISION_STATUS_DUPLICATE_INACTIVE = 3;
  // credential_hash is attached to a pending_authorization record.
  PROVISION_STATUS_DUPLICATE_PENDING  = 4;
  // Operator does not have provisioning permission.
  PROVISION_STATUS_UNAUTHORIZED = 5;
  // role_id does not exist on the server.
  PROVISION_STATUS_INVALID_ROLE = 6;
  // Capture path: new pending_authorization record created, awaiting admin approval.
  PROVISION_STATUS_PENDING_CREATED = 7;
}

// Provisioning mode sent by the PEU firmware in ProvisionCredentialRequest.
enum ProvisionMode {
  PROVISION_MODE_UNSPECIFIED    = 0;
  // Capture path: no operator badge — new member record created as
  // pending_authorization and queued for admin approval.
  PROVISION_MODE_CAPTURE        = 1;
  // Operator-enrol path: operator badge (scan 1) authorises the new member
  // (scan 2) directly into the active state.
  PROVISION_MODE_OPERATOR_ENROLL = 2;
}

// ──────────────────────────────────────────────────────────────────────────
// Service definition (gRPC)
// ──────────────────────────────────────────────────────────────────────────

// PortunusService is the canonical RPC interface.
//
// ESP32 access modules can use this via HTTP/2+TLS when the firmware is
// built with CONFIG_PORTUNUS_USE_GRPC=y.  The module's grpc_client
// component implements the gRPC wire protocol using nghttp2 + esp-tls.
//
// When CONFIG_PORTUNUS_USE_GRPC is disabled, modules fall back to
// HTTP/1.1 with the same protobuf messages and an HMAC signature header.
//
// Other intended consumers:
//   - Server-side admin CLIs
//   - Test harnesses (grpcurl, Go test clients)
//   - Future gateway / proxy components
service PortunusService {
  // SendHeartbeat records a module health telemetry tick.
  rpc SendHeartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // RequestAccess evaluates a credential-read event and returns an access decision.
  rpc RequestAccess(AccessRequest) returns (AccessResponse);

  // ProvisionCredential processes a two-scan provisioning flow from a
  // PROVISIONING_CONSOLE firmware variant.
  rpc ProvisionCredential(ProvisionCredentialRequest) returns (ProvisionCredentialResponse);
}