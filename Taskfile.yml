# https://taskfile.dev
# Install: go install github.com/go-task/task/v3/cmd/task@latest
#
# Usage:
#   task test              — run all tests
#   task test:server       — run server tests only
#   task build:server      — build the server binary
#   task build:server:arm64 — cross-compile for Raspberry Pi
#   task deploy:server     — build, copy, and restart on the Pi
#   task proto:gen         — regenerate protobuf code (Go + Nanopb)
#   task firmware:build    — build the ESP32 firmware
#   task ci:all            — full validation suite
#   task release           — validate + deploy server + build prod firmware
#   task clean             — remove build artifacts
#
# Cross-platform:
#   All tasks run on macOS, Linux, and Windows without modification.
#   Python (required by ESP-IDF) handles file operations that would
#   otherwise need shell-specific syntax. Go and idf.py commands are
#   natively cross-platform.
#
# Deployment:
#   Deploy tasks use SSH to push the server binary to a Raspberry Pi.
#   Configure the target in a .env file (gitignored) in the repo root:
#
#     DEPLOY_HOST=pi@192.168.1.100
#     DEPLOY_DIR=/opt/portunus
#     DEPLOY_SERVICE=portunus-server

version: "3"

dotenv: ['.env']

vars:
  # ── Cross-platform Python resolution ────────────────────────────────────
  # Windows typically installs Python as 'python'; macOS/Linux use 'python3'.
  # Override with: task <target> PYTHON=py
  PYTHON: '{{if eq OS "windows"}}python{{else}}python3{{end}}'

  # ── ESP-IDF Python environment ───────────────────────────────────────────
  # The ESP-IDF venv has nanopb and grpcio-tools pre-installed.
  # Proto generation uses this interpreter so system Python stays unmodified.
  # Override with: task proto:gen IDF_PYTHON=/path/to/python
  IDF_PYTHON: '{{.HOME}}/.espressif/python_env/idf5.5_py3.13_env/bin/python'

  # ── Cross-platform executable extension ─────────────────────────────────
  # Go requires explicit .exe on Windows for 'go build -o'.
  EXE: '{{if eq OS "windows"}}.exe{{end}}'

  # ── Project paths ───────────────────────────────────────────────────────
  SERVER_DIR: server
  FIRMWARE_DIR: access_module

tasks:
  # ─── Aliases ──────────────────────────────────────────────────────────────

  default:
    desc: Show available tasks
    cmds:
      - task --list

  test:
    desc: Run all tests
    cmds:
      - task: test:server

  clean:
    desc: Clean all build artifacts
    cmds:
      - task: clean:server

  # ─── Server ───────────────────────────────────────────────────────────────

  test:server:
    desc: Run all server tests
    dir: "{{.SERVER_DIR}}"
    cmds:
      - go test -count=1 ./...

  test:server:verbose:
    desc: Run all server tests with verbose output
    dir: "{{.SERVER_DIR}}"
    cmds:
      - go test -v -count=1 ./...

  test:server:race:
    desc: Run server tests with race detector
    dir: "{{.SERVER_DIR}}"
    cmds:
      - go test -race -count=1 ./...

  test:server:coverage:
    desc: Run server tests with coverage report
    dir: "{{.SERVER_DIR}}"
    cmds:
      - go test -coverprofile=coverage.out -count=1 ./...
      - go tool cover -func=coverage.out

  test:server:service:
    desc: Run service-layer tests only
    dir: "{{.SERVER_DIR}}"
    cmds:
      - go test -v -count=1 ./internal/portunus/service/

  test:server:http:
    desc: Run HTTP handler tests only
    dir: "{{.SERVER_DIR}}"
    cmds:
      - go test -v -count=1 ./internal/httpapi/

  test:server:store:
    desc: Run SQLite store tests only
    dir: "{{.SERVER_DIR}}"
    cmds:
      - go test -v -count=1 ./internal/portunus/store/sqlite/

  build:server:
    desc: Build the server binary
    dir: "{{.SERVER_DIR}}"
    cmds:
      - go build -o bin/portunus-server{{.EXE}} ./cmd/portunus-server

  build:server:arm64:
    desc: Cross-compile server binary for Raspberry Pi (arm64)
    dir: "{{.SERVER_DIR}}"
    env:
      GOOS: linux
      GOARCH: arm64
    cmds:
      - go build -o bin/portunus-server-linux-arm64 ./cmd/portunus-server

  clean:server:
    desc: Clean server build artifacts
    dir: "{{.SERVER_DIR}}"
    cmds:
      - go clean ./...
      - "{{.PYTHON}} ../scripts/clean.py bin coverage.out"

  lint:server:
    desc: Run Go linters (requires golangci-lint)
    dir: "{{.SERVER_DIR}}"
    cmds:
      - golangci-lint run ./...

  vet:server:
    desc: Run go vet (built-in, no extra tools needed)
    dir: "{{.SERVER_DIR}}"
    cmds:
      - go vet ./...

  fmt:server:
    desc: Check server code formatting (fails if unformatted)
    dir: "{{.SERVER_DIR}}"
    cmds:
      - "{{.PYTHON}} ../scripts/check_fmt.py"

  fmt:server:fix:
    desc: Auto-format server code with gofmt
    dir: "{{.SERVER_DIR}}"
    cmds:
      - gofmt -w .

  # ─── Protobuf ─────────────────────────────────────────────────────────────

  proto:gen:
    desc: Regenerate protobuf code for Go and Nanopb
    cmds:
      - "{{.IDF_PYTHON}} scripts/proto_gen.py"

  proto:gen:go:
    desc: Regenerate Go protobuf stubs only
    cmds:
      - "{{.IDF_PYTHON}} scripts/proto_gen.py --go"

  proto:gen:nanopb:
    desc: Regenerate Nanopb C stubs for ESP32 only
    cmds:
      - "{{.IDF_PYTHON}} scripts/proto_gen.py --nanopb"

  # ─── TLS Certificates ─────────────────────────────────────────────────────

  certs:generate:
    desc: Generate private CA + server TLS certs for LAN deployment
    cmds:
      - bash scripts/generate_certs.sh {{.CLI_ARGS}}

  certs:verify:
    desc: Verify the cert chain (ca.pem → server.pem)
    cmds:
      - openssl verify -CAfile certs/ca.pem certs/server.pem

  # ─── Firmware ─────────────────────────────────────────────────────────────

  firmware:build:
    desc: Build the ESP32 firmware (requires ESP-IDF)
    dir: "{{.FIRMWARE_DIR}}"
    cmds:
      - idf.py build

  firmware:build:dev:
    desc: Build firmware with dev sdkconfig overlay
    dir: "{{.FIRMWARE_DIR}}"
    cmds:
      - idf.py -D SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.dev" build

  firmware:build:prod:
    desc: Build firmware with prod sdkconfig overlay (requires PORTUNUS_HMAC_SECRET in .env)
    dir: "{{.FIRMWARE_DIR}}"
    cmds:
      - |
        : "${PORTUNUS_HMAC_SECRET:?PORTUNUS_HMAC_SECRET must be set in .env}"
        printf 'CONFIG_PORTUNUS_HMAC_SECRET="%s"\n' "$PORTUNUS_HMAC_SECRET" > sdkconfig.defaults.secret
        trap "rm -f sdkconfig.defaults.secret" EXIT
        idf.py -D SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.prod;sdkconfig.defaults.secret" build

  firmware:flash:
    desc: Flash firmware to connected ESP32
    dir: "{{.FIRMWARE_DIR}}"
    cmds:
      - idf.py flash

  firmware:monitor:
    desc: Open serial monitor to connected ESP32
    dir: "{{.FIRMWARE_DIR}}"
    cmds:
      - idf.py monitor

  firmware:flash-monitor:
    desc: Flash firmware and open serial monitor
    dir: "{{.FIRMWARE_DIR}}"
    cmds:
      - idf.py flash monitor

  firmware:menuconfig:
    desc: Open ESP-IDF menuconfig
    dir: "{{.FIRMWARE_DIR}}"
    cmds:
      - idf.py menuconfig

  firmware:clean:
    desc: Clean firmware build directory
    dir: "{{.FIRMWARE_DIR}}"
    cmds:
      - idf.py fullclean

  # ─── Deploy ────────────────────────────────────────────────────────────────
  # Requires SSH key-based auth to the Pi. Configure target in .env:
  #   DEPLOY_HOST=pi@192.168.1.100
  #   DEPLOY_DIR=/opt/portunus
  #   DEPLOY_SERVICE=portunus-server

  deploy:server:
    desc: Build, copy, and restart the server on the Raspberry Pi
    deps: [build:server:arm64]
    vars:
      DEPLOY_HOST: '{{.DEPLOY_HOST | default "pi@192.168.1.100"}}'
      DEPLOY_DIR: '{{.DEPLOY_DIR | default "/opt/portunus"}}'
      DEPLOY_SERVICE: '{{.DEPLOY_SERVICE | default "portunus-server"}}'
    cmds:
      - echo "Deploying to {{.DEPLOY_HOST}}:{{.DEPLOY_DIR}}"
      # Back up current binary on the Pi
      - ssh {{.DEPLOY_HOST}} "sudo cp {{.DEPLOY_DIR}}/bin/portunus-server {{.DEPLOY_DIR}}/bin/portunus-server.prev 2>/dev/null || true"
      # Copy new binary
      - scp {{.SERVER_DIR}}/bin/portunus-server-linux-arm64 {{.DEPLOY_HOST}}:/tmp/portunus-server
      # Move into place and restart
      - ssh {{.DEPLOY_HOST}} "sudo mv /tmp/portunus-server {{.DEPLOY_DIR}}/bin/portunus-server && sudo chmod 755 {{.DEPLOY_DIR}}/bin/portunus-server && sudo systemctl restart {{.DEPLOY_SERVICE}}"
      # Verify
      - ssh {{.DEPLOY_HOST}} "sudo systemctl is-active {{.DEPLOY_SERVICE}}"
      - echo "Deploy complete"

  deploy:server:status:
    desc: Check the server status on the Raspberry Pi
    vars:
      DEPLOY_HOST: '{{.DEPLOY_HOST | default "pi@192.168.1.100"}}'
      DEPLOY_SERVICE: '{{.DEPLOY_SERVICE | default "portunus-server"}}'
    cmds:
      - ssh {{.DEPLOY_HOST}} "sudo systemctl status {{.DEPLOY_SERVICE}} --no-pager"

  deploy:server:logs:
    desc: Tail server logs on the Raspberry Pi
    vars:
      DEPLOY_HOST: '{{.DEPLOY_HOST | default "pi@192.168.1.100"}}'
      DEPLOY_SERVICE: '{{.DEPLOY_SERVICE | default "portunus-server"}}'
    cmds:
      - ssh {{.DEPLOY_HOST}} "sudo journalctl -u {{.DEPLOY_SERVICE}} -f"

  deploy:server:rollback:
    desc: Roll back to the previous server binary on the Raspberry Pi
    vars:
      DEPLOY_HOST: '{{.DEPLOY_HOST | default "pi@192.168.1.100"}}'
      DEPLOY_DIR: '{{.DEPLOY_DIR | default "/opt/portunus"}}'
      DEPLOY_SERVICE: '{{.DEPLOY_SERVICE | default "portunus-server"}}'
    cmds:
      - ssh {{.DEPLOY_HOST}} "sudo systemctl stop {{.DEPLOY_SERVICE}} && sudo cp {{.DEPLOY_DIR}}/bin/portunus-server.prev {{.DEPLOY_DIR}}/bin/portunus-server && sudo systemctl start {{.DEPLOY_SERVICE}}"
      - ssh {{.DEPLOY_HOST}} "sudo systemctl is-active {{.DEPLOY_SERVICE}}"
      - echo "Rollback complete"

  # ─── CI ───────────────────────────────────────────────────────────────────

  proto:check:
    desc: Verify generated protobuf code is up to date (for CI)
    cmds:
      - "{{.IDF_PYTHON}} scripts/proto_gen.py --check"

  ci:server:
    desc: Full server CI check (vet, format, test with race detector)
    cmds:
      - task: vet:server
      - task: fmt:server
      - task: test:server:race

  ci:all:
    desc: Full CI — server checks + proto drift + firmware compile
    cmds:
      - task: ci:server
      - task: proto:check
      - task: firmware:build

  release:
    desc: Full release — validate, deploy server, build prod firmware
    cmds:
      - task: ci:all
      - task: deploy:server
      - task: firmware:clean
      - task: firmware:build:prod
      - echo "Server deployed. Firmware built. Flash with 'task firmware:flash'"