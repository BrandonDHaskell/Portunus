{{define "title"}}New Role — Portunus Admin{{end}}
{{define "content"}}
<div class="page-header">
  <h1>New Role</h1>
  <a class="btn btn-secondary" href="/admin/ui/roles">← Back</a>
</div>
<div class="card" style="max-width:480px">
  <form method="POST" action="/admin/ui/roles">
    <div class="form-group">
      <label for="name">Name</label>
      <input id="name" name="name" type="text" value="{{.Form.Name}}" autofocus required>
      <p class="hint">Becomes the role_id (lowercase, spaces → underscores).</p>
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <input id="description" name="description" type="text" value="{{.Form.Description}}">
    </div>
    <div class="actions">
      <button class="btn btn-primary" type="submit">Create Role</button>
      <a class="btn btn-secondary" href="/admin/ui/roles">Cancel</a>
    </div>
  </form>
</div>
{{end}}
