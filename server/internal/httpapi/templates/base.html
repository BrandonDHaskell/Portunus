{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{block "title" .}}Portunus Admin{{end}}</title>
<script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="/admin/ui/static/style.css">
</head>
<body>
<nav>
  <a class="brand" href="/admin/ui/">Portunus</a>
  {{if .Session}}
  <a href="/admin/ui/users" {{if eq .ActivePage "users"}}class="active"{{end}}>Users</a>
  <a href="/admin/ui/roles" {{if eq .ActivePage "roles"}}class="active"{{end}}>Roles</a>
  <a href="/admin/ui/members" {{if eq .ActivePage "members"}}class="active"{{end}}>Members</a>
  <a href="/admin/ui/members/pending" {{if eq .ActivePage "pending"}}class="active"{{end}}>Pending</a>
  <a href="/admin/ui/modules" {{if eq .ActivePage "modules"}}class="active"{{end}}>Modules</a>
  <a href="/admin/ui/doors" {{if eq .ActivePage "doors"}}class="active"{{end}}>Doors</a>
  <span class="nav-user">{{.Session.Username}} ({{.Session.RoleID}}) &nbsp;
    <form method="POST" action="/admin/ui/logout" style="display:inline">
      <button class="btn btn-secondary btn-sm" type="submit">Sign out</button>
    </form>
  </span>
  {{end}}
  <button id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark theme" style="background:none;border:none;cursor:pointer;font-size:16px;padding:0 .25rem;line-height:1;color:var(--text-muted)">☾</button>
</nav>
<main>
  {{if .Flash}}<div class="flash {{.FlashType}}">{{.Flash}}</div>{{end}}
  {{block "content" .}}{{end}}
</main>
<script src="/admin/ui/static/htmx.min.js"></script>
<script>
function toggleTheme(){
  var h=document.documentElement;
  var next=h.getAttribute('data-theme')==='dark'?'light':'dark';
  h.setAttribute('data-theme',next);
  localStorage.setItem('theme',next);
  document.getElementById('theme-toggle').textContent=next==='dark'?'☀':'☾';
}
document.getElementById('theme-toggle').textContent=
  document.documentElement.getAttribute('data-theme')==='dark'?'☀':'☾';
</script>
</body>
</html>{{end}}
