{{define "title"}}Change Password — Portunus Admin{{end}}
{{define "content"}}
<div class="page-header"><h1>Change Password</h1></div>
{{if .MustChange}}
<div class="flash warn">You must change your password before continuing.</div>
{{end}}
<div class="card" style="max-width:480px">
  <form method="POST" action="/admin/ui/change-password">
    <div class="form-group">
      <label for="current_password">Current Password</label>
      <input id="current_password" name="current_password" type="password" autocomplete="current-password" required>
    </div>
    <div class="form-group">
      <label for="new_password">New Password</label>
      <input id="new_password" name="new_password" type="password" autocomplete="new-password" required>
      <p class="hint">Minimum 12 characters.</p>
    </div>
    <div class="form-group">
      <label for="confirm_password">Confirm New Password</label>
      <input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" required>
    </div>
    <div class="actions">
      <button class="btn btn-primary" type="submit">Change Password</button>
      {{if not .MustChange}}<a class="btn btn-secondary" href="/admin/ui/">Cancel</a>{{end}}
    </div>
  </form>
</div>
{{end}}
